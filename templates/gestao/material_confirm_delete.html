{% extends 'base.html' %}

{% block title %}Excluir Material{% endblock %}
{% block page_title %}Atenção{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card card-danger card-outline">
            <div class="card-header">
                <h3 class="card-title">Confirmar Exclusão</h3>
            </div>
            <div class="card-body">
                <p>Tem certeza que deseja remover o material <strong>{{ object.nome }}</strong> do sistema?</p>
            </div>
            <div class="card-footer text-end">
                <form method="post">
                    {% csrf_token %}
                    <a href="{% url 'material_list' %}" class="btn btn-secondary me-2">Cancelar</a>
                    <button type="submit" class="btn btn-danger">Sim, Excluir</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
