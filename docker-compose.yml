services:
  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 --reload core.wsgi:application
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    ports:
      - "8585:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  static_volume:
